# Text2Px - Default Training Configuration
# A lightweight DiT model for 16x16 pixel art generation from text

model:
  image_size: 16
  patch_size: 2
  in_channels: 4  # RGBA
  hidden_size: 256
  depth: 6
  num_heads: 4
  mlp_ratio: 4.0
  text_embed_dim: 128
  max_text_len: 32
  vocab_size: 512
  num_classes: null  # unused, we use free-form text

diffusion:
  timesteps: 1000
  beta_schedule: "cosine"
  prediction_type: "epsilon"  # predict noise

training:
  batch_size: 64
  learning_rate: 1.0e-4
  weight_decay: 0.01
  epochs: 500
  warmup_steps: 100
  save_every: 50
  sample_every: 25
  grad_clip: 1.0
  ema_decay: 0.9999
  optimizer: "adamw"

data:
  dataset_dir: "data/minecraft_items"
  image_size: 16
  augment: true
